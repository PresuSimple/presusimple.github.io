<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Generador de Recibos Online Gratis | ReciboSimple</title>
<link rel="icon" type="image/png" href="favicon2.png">

<meta name="description" content="Generador de recibos online gratis. Crea recibos profesionales en PDF de forma rápida y simple.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.logo {
  max-width: 320px;
  width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
}
  
@media (max-width: 600px) {
  .logo {
    max-width: 220px;
  }
}  
  
body{
font-family:system-ui;
background:#f2f4f8;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,.1);
}

.brand{
text-align:center;
margin-bottom:20px;
}

.brand img{
max-width:200px;
}

.brand .tagline{
font-size:14px;
color:#666;
}

label{
display:block;
margin-top:10px;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:4px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
margin-top:12px;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
background:#007bff;
color:white;
}

button:hover{
opacity:.9;
}

.small{
font-size:13px;
margin-top:8px;
}

#estado{
margin-top:10px;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">
<h1>Generador de Recibos Online Gratis</h1>

<div class="brand">
<img src="logo2.png" alt="ReciboSimple" class="logo">
</div>


<label>Número de recibo
<input id="numero" readonly>
</label>

<label>Cliente
<input id="cliente">
</label>

<label>Concepto
<input id="concepto">
</label>

<label>Monto
<input type="number" id="monto">
</label>

<label>Forma de pago
<select id="pago">
<option>Efectivo</option>
<option>Transferencia</option>
<option>Tarjeta</option>
<option>Otro</option>
</select>
</label>

<label>Moneda
<select id="moneda">
<option value="$">$ Pesos</option>
<option value="USD">USD</option>
<option value="€">€</option>
</select>
</label>

<label class="small">
Logo de tu negocio
<input type="file" id="logoInput" accept="image/*">
</label>

<label>Fecha
<input type="date" id="fecha">
</label>

<button onclick="generarPDF()">Descargar Recibo PDF</button>

<div id="estado"></div>

<p style="margin-top:30px;font-size:13px;text-align:center">
<div style="
margin-top:30px;
padding:20px;
background:#f1f8ff;
border:2px dashed #339af0;
border-radius:16px;
text-align:center;
">

<h3>📄 ¿Necesitás hacer un presupuesto?</h3>

<p>
Antes de emitir un recibo normalmente se envía un presupuesto al cliente.
</p>

<a href="https://presusimple.github.io" target="_blank">
<button style="background:#28a745">
Ir a PresuSimple
</button>
</a>

<div style="font-size:13px;margin-top:8px;">
Generá presupuestos profesionales en PDF gratis
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script>

/* NUMERO AUTOMATICO */

let numero = Number(localStorage.getItem("numeroRecibo")) || 1
document.getElementById("numero").value = numero

/* LOGO */

let logoData=null
let logoWidth=0
let logoHeight=0

document.getElementById("logoInput").addEventListener("change", e=>{

const file=e.target.files[0]

if(!file)return

const reader=new FileReader()

reader.onload=ev=>{

logoData=ev.target.result

const img=new Image()

img.onload=()=>{
logoWidth=img.width
logoHeight=img.height
}

img.src=logoData

estado.innerText="✔ Logo cargado"

}

reader.readAsDataURL(file)

})

/* GENERAR PDF */

function generarPDF(){

const cliente=document.getElementById("cliente").value
const concepto=document.getElementById("concepto").value
const monto=document.getElementById("monto").value
const moneda=document.getElementById("moneda").value
const pago=document.getElementById("pago").value
const fecha=document.getElementById("fecha").value

if(!concepto || !monto){
estado.innerText="Completa concepto y monto"
return
}

const {jsPDF}=window.jspdf

const doc=new jsPDF()

let y=20

/* LOGO */

if(logoData){

doc.addImage(
logoData,
"PNG",
20,
10,
40,
20
)

y = 40

}

/* TITULO */

doc.setFontSize(26)
doc.setTextColor(196,98,45)

doc.text(
"RECIBO",
105,
y,
{align:"center"}
)

y+=10

doc.setTextColor(0)

doc.setDrawColor(200)
doc.line(20,y,190,y)

y+=10

doc.setFontSize(11)

doc.text("N° Recibo: "+numero,20,y)
y+=8

if(cliente){
doc.text("Cliente: "+cliente,20,y)
y+=8
}

doc.text("Fecha: "+fecha,20,y)
y+=10

/* TABLA */

doc.autoTable({

startY:y,

head:[["Concepto","Forma de pago","Monto"]],

body:[[
concepto,
pago,
moneda+monto
]],

styles:{
fontSize:11,
cellPadding:4
},

headStyles:{
fillColor:[245,235,225],
textColor:80,
fontStyle:"bold"
},

columnStyles:{
0:{cellWidth:90},
1:{cellWidth:50},
2:{cellWidth:40,halign:"right"}
}

})

y=doc.lastAutoTable.finalY+10

/* TOTAL */

doc.setDrawColor(0)
doc.setLineWidth(1)

doc.line(120,y,190,y)

y+=10

doc.setFillColor(245,235,225)
doc.rect(120,y-10,70,16,"F")

doc.setFontSize(16)
doc.setTextColor(196,98,45)

doc.text(
"TOTAL: "+moneda+monto,
185,
y,
{align:"right"}
)

doc.setTextColor(0)
doc.setLineWidth(0.2)

/* FOOTER */

const pageHeight=doc.internal.pageSize.height

doc.setFontSize(8)
doc.setTextColor(150)

doc.text(
"Recibo generado con ReciboSimple - presusimple.github.io",
105,
pageHeight-10,
{align:"center"}
)

doc.save("recibo.pdf")

numero++

localStorage.setItem("numeroRecibo",numero)

document.getElementById("numero").value=numero

estado.innerText="Recibo generado ✔"

setTimeout(()=>{
estado.innerText=""
},3000)

}

</script>

</body>
</html>
