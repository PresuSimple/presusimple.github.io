<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Calculadora de presupuesto online (gratis)</title>

<meta name="description" content="Calcula el precio de un trabajo o servicio fácilmente. Usa esta calculadora de presupuesto online gratis para estimar costos rápidamente.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="canonical" href="https://presusimple.github.io/calculadora-de-presupuesto.html">

<style>

body{
font-family:system-ui;
background:#f2f4f8;
margin:0;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

p{
line-height:1.6;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
font-size:16px;
}

.resultado{
margin-top:20px;
font-size:24px;
font-weight:700;
color:#2e7d32;
}

.boton{
display:inline-block;
margin-top:30px;
padding:14px 20px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

.links{
margin-top:40px;
border-top:1px solid #ddd;
padding-top:20px;
}

.links a{
display:block;
margin-top:8px;
color:#2e7d32;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Calculadora de presupuesto</h1>

<p>
Usa esta calculadora para estimar rápidamente el precio de un trabajo o servicio.
Solo ingresa la cantidad de horas y tu tarifa.
</p>

<label>Horas de trabajo</label>
<input type="number" id="horas">

<label>Precio por hora</label>
<input type="number" id="precio">

<button onclick="calcular()">Calcular presupuesto</button>

<div class="resultado" id="resultado"></div>

<a class="boton" href="https://presusimple.github.io/">
Crear presupuesto profesional en PDF
</a>

<div class="links">

<h2>Más herramientas</h2>

<a href="https://presusimple.github.io/">
Generador de presupuestos online
</a>

<a href="https://presusimple.github.io/como-hacer-un-presupuesto.html">
Cómo hacer un presupuesto
</a>

<a href="https://presusimple.github.io/plantilla-de-presupuesto.html">
Plantilla de presupuesto
</a>

</div>

</div>

<script>

function calcular(){

const horas = Number(document.getElementById("horas").value);
const precio = Number(document.getElementById("precio").value);

if(horas <= 0 || precio <= 0){
document.getElementById("resultado").innerText = "Ingresa valores válidos";
return;
}

const total = horas * precio;

document.getElementById("resultado").innerText = "Total estimado: $" + total;

}

</script>

</body>
</html>
