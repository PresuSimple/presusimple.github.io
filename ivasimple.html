<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IVA Simple | Calculadora de IVA 21% 10.5% 27%</title>
<meta name="description" content="Calculadora de IVA simple. Calcula IVA 21%, 10.5% y 27% desde el precio neto o el total. Herramienta gratuita online.">
<link rel="icon" type="image/png" href="favicon.png">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:white;
padding:20px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:32px;
font-weight:bold;
color:#2c7be5;
}

nav{
margin-top:10px;
}

nav a{
margin:0 10px;
text-decoration:none;
color:#333;
font-size:14px;
}

.container{
margin-top:40px;
display:flex;
justify-content:center;
}

.herramienta{
background:#2c7be5;
padding:30px;
border-radius:10px;
color:white;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
background:#1a5ed8;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#144bb0;
}

.resultado{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

footer{
margin-top:60px;
padding:20px;
font-size:14px;
color:#555;
}

</style>

<script>

function calcularIVA(){

let monto=parseFloat(document.getElementById("monto").value);
let tipo=document.getElementById("tipo").value;
let iva=parseFloat(document.getElementById("iva").value);

if(isNaN(monto)){

document.getElementById("resultado").innerHTML="Ingresa un monto válido";
return;

}

let neto,ivaCalculado,total;

if(tipo=="neto"){

neto=monto;
ivaCalculado=neto*iva/100;
total=neto+ivaCalculado;

}else{

total=monto;
neto=total/(1+iva/100);
ivaCalculado=total-neto;

}

document.getElementById("resultado").innerHTML=
"Neto: $"+neto.toFixed(2)+"<br>"+
"IVA: $"+ivaCalculado.toFixed(2)+"<br>"+
"Total: $"+total.toFixed(2);

}

</script>

</head>

<body>

<header>

<div class="logo">IVA SIMPLE</div>

<nav>
<a href="index.html">Inicio</a>
<a href="presupuestos.html">Presupuestos</a>
<a href="recibos.html">Recibos</a>
<a href="herramientas.html">Herramientas</a>
</nav>

</header>

<div class="container">

<div class="herramienta">

<h2>Calculadora de IVA</h2>

<input id="monto" type="number" placeholder="Ingresa el monto">

<select id="tipo">
<option value="neto">Tengo el precio NETO</option>
<option value="total">Tengo el precio FINAL</option>
</select>

<select id="iva">
<option value="21">IVA 21%</option>
<option value="10.5">IVA 10.5%</option>
<option value="27">IVA 27%</option>
</select>

<button onclick="calcularIVA()">Calcular</button>

<div id="resultado" class="resultado"></div>

</div>

</div>

<footer>

<p>Herramienta gratuita para calcular IVA online.</p>

<p style="font-size:14px;">
<a href="sobre-nosotros.html">Sobre nosotros</a> |
<a href="contacto.html">Contacto</a> |
<a href="terminos.html">Términos</a>
</p>

</footer>

</body>
</html>
